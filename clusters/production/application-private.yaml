apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-private
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/marcelvanleeuwen/homelab-private.git
    targetRevision: main
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
