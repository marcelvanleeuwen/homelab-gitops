apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - longhorn-application.yaml
  - metallb-application.yaml
  - metallb-config-application.yaml

patches:
  - path: argocd-serverlb-patch.yaml
    target:
      version: v1
      kind: Service
      name: argocd-server
      namespace: argocd

  - path: argocd-cm-patch.yaml
    target:
      version: v1
      kind: ConfigMap
      name: argocd-reconcil
      namespace: argocd
