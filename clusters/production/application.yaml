apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-public
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/marcelvanleeuwen/homelab-gitops.git
    targetRevision: main
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
